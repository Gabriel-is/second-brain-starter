# Second Brain Starter — Supabase Configuration
# Most settings here are defaults. The important parts are at the bottom:
# the [functions.mcp] section that configures your edge function.

project_id = "second-brain-starter"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

# ─── Your MCP Server ──────────────────────────────────────────
# This is the edge function that Claude connects to.
# verify_jwt = false means Claude can call it without a Supabase auth token.
# The server uses your service role key internally for database access.
[functions.mcp]
enabled = true
verify_jwt = false
import_map = "./functions/mcp/deno.json"
entrypoint = "./functions/mcp/index.ts"
